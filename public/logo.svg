<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5dfeca;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#logoGradient)" opacity="0.15"/>
  <!-- Document/Exam paper -->
  <rect x="18" y="12" width="28" height="40" rx="3" fill="none" stroke="url(#logoGradient)" stroke-width="2.5"/>
  <!-- Checkmark -->
  <path d="M24 32 L30 38 L42 24" stroke="url(#logoGradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Lines representing text -->
  <line x1="22" y1="18" x2="42" y2="18" stroke="url(#logoGradient)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="22" y1="24" x2="38" y2="24" stroke="url(#logoGradient)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
</svg>